<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob:; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com data:; script-src 'self'; connect-src 'self' https: http: data:;" />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="pet.css" />
</head>
<body>
<div id="pet-root"></div>
<script>
  // Electron loads frames from the local assets folder.
  // Living-portrait face layers (registered transparent PNGs).
  window.PET_FRAMES = {
    base: 'assets/base.png',    // eyes open, mouth closed (idle)
    blink: 'assets/blink.png',  // eyes closed
    talk: 'assets/talk.png',    // mouth open (speaking)
    // hair-breeze frame sequence (hard-cut ping-pong during a wind gust)
    windRect: [99, 19, 191, 383],
    windFrames: ['assets/w00.png','assets/w01.png','assets/w02.png','assets/w03.png','assets/w04.png','assets/w05.png','assets/w06.png','assets/w07.png','assets/w08.png','assets/w09.png','assets/w10.png','assets/w11.png','assets/w12.png','assets/w13.png','assets/w14.png','assets/w15.png']
  };
</script>
<script src="app.js"></script>
</body>
</html>
